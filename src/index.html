<!doctype html>
<html lang="hu">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>miside.hu — Karakter archívum</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Zen+Kaku+Gothic+Antique:wght@400;500;700;900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="/css/effects.css" />
<link rel="stylesheet" href="/css/v1.css" />
<link rel="stylesheet" href="/css/v2.css" />

<style>
  html, body { height: 100%; margin: 0; }
  body { background: #0a0210; }
  #root { width: 100vw; min-height: 100vh; }
  .v2 { min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="/js/tweaks-panel.jsx"></script>
<script type="text/babel" src="/js/characters.jsx"></script>
<script type="text/babel" src="/js/effects.jsx"></script>
<script type="text/babel" src="/js/v2.jsx"></script>

<script type="text/babel">
const { useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "glitch": 0.3,
  "mode": "horror"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const intensity = Number(tweaks.glitch ?? 0.3);
  const mode = tweaks.mode ?? "horror";

  useEffect(() => {
    document.documentElement.setAttribute("data-mode", mode);
  }, [mode]);

  return (
    <>
      <V2GameUI characters={CHARACTERS} intensity={intensity} mode={mode} />

      <TweaksPanel title="Tweaks" defaultPos={{ right: 20, bottom: 20 }}>
        <TweakSection title="Glitch intenzitás">
          <TweakSlider
            label="Mennyi a horror átszüremlés?"
            value={intensity}
            min={0}
            max={1}
            step={0.05}
            onChange={(v) => setTweak("glitch", v)}
          />
          <div style={{ fontFamily: "var(--font-mono)", fontSize: 10, letterSpacing: "0.16em", textTransform: "uppercase", opacity: 0.6, marginTop: 4 }}>
            {intensity < 0.2 ? "tiszta" : intensity < 0.5 ? "vegyes" : intensity < 0.8 ? "torzul" : "kód-szakadás"}
          </div>
        </TweakSection>
        <TweakSection title="Háttér hangulat">
          <TweakRadio
            value={mode}
            options={[
              { value: "kawaii", label: "Pasztell" },
              { value: "dark", label: "Lila" },
              { value: "horror", label: "Horror" },
            ]}
            onChange={(v) => setTweak("mode", v)}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
